<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 نادي الإعلام والتواصل</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f0f23 0%,#2a2a4a 50%,#1a1a2e 100%);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}.container{max-width:500px;width:100%;background:rgba(255,255,255,0.1);backdrop-filter:blur(15px);border-radius:25px;padding:40px;border:1px solid rgba(255,255,255,0.2);box-shadow:0 25px 50px rgba(0,0,0,0.5)}h1{font-size:32px;text-align:center;margin-bottom:15px;background:linear-gradient(45deg,#00d4ff,#ff6b9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 30px rgba(0,212,255,0.5)}p.subtitle{font-size:16px;text-align:center;opacity:0.9;margin-bottom:30px}.form-group{position:relative;margin-bottom:25px}input{width:100%;padding:18px 20px;font-size:16px;border:none;border-radius:15px;background:rgba(255,255,255,0.15);color:#fff;backdrop-filter:blur(10px);transition:all 0.3s;box-sizing:border-box}input::placeholder{color:rgba(255,255,255,0.7)}input:focus{outline:none;background:rgba(255,255,255,0.25);box-shadow:0 0 25px rgba(0,212,255,0.5);transform:translateY(-2px)}.btn{width:100%;padding:20px;font-size:18px;font-weight:bold;border:none;border-radius:15px;background:linear-gradient(45deg,#25d366,#20ba5a);color:#fff;cursor:pointer;transition:all 0.3s;box-shadow:0 10px 30px rgba(37,211,102,0.4);text-transform:uppercase;letter-spacing:1px}.btn:hover{transform:translateY(-3px);box-shadow:0 15px 40px rgba(37,211,102,0.6)}footer{text-align:center;margin-top:30px;opacity:0.7;font-size:14px}@media(max-width:480px){.container{padding:30px 20px}h1{font-size:26px}}
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 نادي الإعلام والتواصل</h1>
    <p class="subtitle">انضم الآن لأكبر مجتمع إعلامي</p>
    
    <form id="joinForm">
      <div class="form-group">
        <input type="text" id="name" placeholder="الاسم الكامل *" required>
      </div>
      <div class="form-group">
        <input type="tel" id="phone" placeholder="رقم الواتساب *" required>
      </div>
      <button type="submit" class="btn">🚀 إرسال الطلب الآن</button>
    </form>
  </div>
  
  <footer>© 2024 نادي الإعلام والتواصل</footer>

  <script>
    document.getElementById('joinForm').addEventListener('submit',e=>{
      e.preventDefault();
      const name=document.getElementById('name').value;
      const phone=document.getElementById('phone').value;
      const number="212678479295";
      const msg=encodeURIComponent(`أود الانضمام لمجموعة نادي الإعلام والتواصل\nالاسم: ${name}\nالهاتف: ${phone}`);
      window.open(`https://wa.me/${number}?text=${msg}`,'_blank');
      alert('✅ تم إرسال طلبك بنجاح!');
    });
  </script>
</body>
</html>
